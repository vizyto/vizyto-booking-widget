<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strona klienta - test widgetu Vizyto</title>
    <style>
      body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f4f4f5; color: #222; margin: 0; }
      .hero { padding: 90px 24px 40px; text-align: center; }
      h1 { font-size: 34px; margin: 0 0 14px; }
      p { color: #666; max-width: 560px; margin: 0 auto 8px; line-height: 1.6; }
      code { background: #e8e8ea; padding: 2px 6px; border-radius: 6px; font-size: 13px; }
      .demo { max-width: 620px; margin: 30px auto 80px; padding: 0 24px; }
      .demo h2 { font-size: 16px; color: #888; text-transform: uppercase; letter-spacing: .1em; }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>Dowolna strona klienta</h1>
      <p>Wix, WordPress, czysty HTML - bez znaczenia. Moduł rezerwacji dołączony jednym tagiem <code>&lt;script&gt;</code>.</p>
      <p>Kliknij pomarańczowy przycisk w prawym dolnym rogu.</p>
    </div>

    <div class="demo">
      <h2>Wariant inline (opcjonalny)</h2>
      <p style="text-align:left">Dodaj <code>&lt;div data-vizyto-booking&gt;&lt;/div&gt;</code> i kreator wmontuje się w to miejsce zamiast przycisku.</p>
    </div>

    <!-- ============ JEDYNE, CO WKLEJA WŁAŚCICIEL STRONY ============ -->
    <script
      type="module"
      src="/src/index.ts"
      data-vizyto-business="24"
      data-vizyto-key="REPLACE_WITH_KEY"
      data-vizyto-api="http://127.0.0.1:5454"
      data-vizyto-label="Zarezerwuj wizytę"
      data-vizyto-accent="#fd9320"
    ></script>
  </body>
</html>
