name: Deploy widget (Cloudflare)

# Tag a release to ship widget.vizyto.com/v1/widget.js:
#   make release V=1.0.0   (tags v1.0.0 + pushes)
# Or run manually from the Actions tab (workflow_dispatch).
# Only needs the org's CLOUDFLARE_API_TOKEN secret (account is inferred).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build:cdn
      - name: Deploy to Cloudflare
        run: pnpm dlx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
